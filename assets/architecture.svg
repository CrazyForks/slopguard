<rect width="860" height="470" rx="12" fill="#0d1117"/><text x="28" y="34" fill="#e6edf3" font-size="17" font-weight="700" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">How SlopGuard works</text><rect x="28" y="60" width="200" height="56" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text x="128" y="84" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">PR / Issue opened</text><text x="128" y="102" fill="#8b949e" font-size="11" font-weight="400" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">on GitHub</text><line x1="228" y1="88" x2="300" y2="88" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/><rect x="300" y="60" width="230" height="56" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/><text x="415" y="84" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">/api/webhook</text><text x="415" y="102" fill="#8b949e" font-size="11" font-weight="400" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">verify · dedupe · ACK 202</text><line x1="415" y1="116" x2="415" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/><rect x="150" y="150" width="560" height="210" rx="9" fill="#11161d" stroke="#30363d" stroke-width="1.5"/><text x="170" y="176" fill="#d29922" font-size="13" font-weight="600" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">Detection agent (LangGraph)</text><rect x="170" y="192" width="250" height="70" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/><text x="186" y="216" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">static heuristics</text><text x="186" y="236" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">boilerplate · emoji · empty</text><text x="186" y="252" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">prompt-injection</text><rect x="440" y="192" width="250" height="70" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/><text x="456" y="216" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">LLM judge</text><text x="456" y="236" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Claude / Grok / OpenAI</text><text x="456" y="252" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">optional, falls back</text><rect x="170" y="278" width="250" height="70" rx="9" fill="#161b22" stroke="#d29922" stroke-width="1.5"/><text x="186" y="302" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">provenance</text><text x="186" y="322" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">model hints · fingerprint</text><text x="186" y="338" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">leaked phrases</text><rect x="440" y="278" width="250" height="70" rx="9" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/><text x="456" y="302" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">policy enforcement</text><text x="456" y="322" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">.github/SLOP_POLICY.yml</text><text x="456" y="338" fill="#8b949e" font-size="11" font-weight="400" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">thresholds · labels</text><line x1="415" y1="360" x2="415" y2="392" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/><rect x="180" y="392" width="460" height="52" rx="9" fill="#161b22" stroke="#d29922" stroke-width="1.5"/><text x="410" y="414" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">score 0–100</text><text x="410" y="432" fill="#8b949e" font-size="11" font-weight="400" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">slop-quarantine label + review comment  (never auto-closes)</text><rect x="660" y="392" width="180" height="52" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/><text x="750" y="414" fill="#3fb950" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">Maintainer</text><text x="750" y="432" fill="#8b949e" font-size="11" font-weight="400" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">/slop approve · reject</text><line x1="640" y1="418" x2="660" y2="418" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/></svg>